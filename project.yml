name: MacPal
options:
  bundleIdPrefix: com.teerapat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  MacPal:
    type: application
    platform: macOS
    sources:
      - MacPal
    info:
      path: MacPal/Info.plist
      properties:
        CFBundleName: MacPal
        CFBundleDisplayName: MacPal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright 2026"
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.teerapat.MacPal
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_APP_SANDBOX: NO
